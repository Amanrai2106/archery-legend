<!DOCTYPE html>
<html>
    <head>
       <title>Archery Game</title>
       <meta name="viewport" content="width=device-width, initial-scale=1" >
       <meta charset="utf-8">
       <script src="https://bridge.playgama.com/v1/stable/playgama-bridge.js"></script>
       <link rel="stylesheet" href="css/style.css">
       <script type="text/javascript" src="js/main.js"></script>
    </head>
    <body>
        <div id="mainContainer">
        <canvas id="myCanvas"></canvas>
        <canvas id="animCanvas"></canvas>
        <h1 id="score">0</h1>
        <div id="showPoint">
            <div id="timerDiv"></div>
            <p id="arrs">&uarr;</p><span class="u">&uarr; +4</span>

        </div>
        <div id="startMenu">
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <h1 id="title">ARCHERY GAME</h1>
                <button id="startBtn">TAP TO START</button>
                <button id="rewardBtn" style="display:none;">WATCH AD FOR +5 ARROWS</button>
                <h2><span id="best">0</span><br>Best</h2>
            </div>
        </div>
    </div>
    </body>
</html>
