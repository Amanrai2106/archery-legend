<!DOCTYPE html>
<html>
    <head>
       <title>Archery Game</title>
       <meta name="viewport" content="width=device-width, initial-scale=1" >
       <meta charset="utf-8">
       <script src="https://bridge.playgama.com/v1/stable/playgama-bridge.js"></script>
       <link rel="stylesheet" href="css/style.css">
       <script type="text/javascript" src="js/main.js"></script>
    </head>
    <body>
        <div id="mainContainer">
        <div id="storyOverlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.9); z-index:2000; color:#fff; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px; box-sizing:border-box;">
            <div id="storyText" style="font-size:24px; line-height:1.6; max-width:800px; margin-bottom:30px; font-family:'Courier New', Courier, monospace;"></div>
            <button id="skipStoryBtn" style="background:#fff; color:#000; border:none; padding:10px 25px; border-radius:20px; cursor:pointer; font-weight:bold;">SKIP STORY</button>
        </div>
        <div id="ui-overlay" style="position: absolute; top: 10px; right: 10px; z-index: 500;">
            <button id="muteBtn" style="background: rgba(0,0,0,0.5); border: 2px solid #fff; color: #fff; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px;">🔊</button>
        </div>
        <canvas id="myCanvas"></canvas>
        <canvas id="animCanvas"></canvas>
        <h1 id="score">0</h1>
        <div id="game-stats" style="position: absolute; top: 100px; left: 10px; color: #fff; text-align: left; z-index: 500; font-family: 'Courier New', Courier, monospace;">
            <div id="wind-display">Wind: 0</div>
            <div id="combo-display">Combo: x1</div>
        </div>
        <div id="showPoint">
            <div id="timerDiv"></div>
            <p id="arrs">&uarr;</p><span class="u">&uarr; +4</span>

        </div>
        <div id="startMenu">
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <h1 id="title">ARCHERY GAME</h1>
                <button id="startBtn">TAP TO START</button>
                <button id="rewardBtn" style="display:none;">WATCH AD FOR +5 ARROWS</button>
                <h2><span id="best">0</span><br>Best</h2>
            </div>
        </div>
    </div>
    </body>
</html>
